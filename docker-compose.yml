version: '3.8'

services:
  # OpenClaw 服务器
  openclaw:
    image: openclaw/openclaw:latest
    container_name: x-agent-openclaw
    ports:
      - "8080:8080"
    environment:
      - OPENCLAW_PORT=8080
      - LOG_LEVEL=info
    volumes:
      - openclaw_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # X-Agent 应用
  x-agent:
    build:
      context: ./x-agent
      dockerfile: Dockerfile
    container_name: x-agent-app
    ports:
      - "9000:9000"
    environment:
      - OPENCLAW_API_ENDPOINT=http://openclaw:8080
      - PYTHONUNBUFFERED=1
      - TZ=UTC
    env_file:
      - ./x-agent/.env
    volumes:
      - ./x-agent/data:/app/data
      - ./x-agent/logs:/app/logs
    depends_on:
      openclaw:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - x-agent-network

volumes:
  openclaw_data:
    driver: local

networks:
  x-agent-network:
    driver: bridge
