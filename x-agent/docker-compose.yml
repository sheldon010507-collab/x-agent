version: "3.9"

services:
  x-agent:
    build:
      context: ./x-agent
      dockerfile: Dockerfile
    container_name: x-agent-v3
    env_file:
      - ./x-agent/.env
    volumes:
      - ./x-agent/data:/app/data
      - ./x-agent/logs:/app/logs
    restart: unless-stopped
    command: python main.py
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

