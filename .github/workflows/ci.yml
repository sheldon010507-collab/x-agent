name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install black isort

      - name: Check formatting (black)
        run: black --check --line-length 100 x-agent/modules/ x-agent/tests/

      - name: Check import order (isort)
        run: isort --check-only --profile black x-agent/modules/ x-agent/tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: x-agent
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        working-directory: x-agent
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=modules --cov-report=term-missing --cov-fail-under=20

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r x-agent/modules/ -ll -x x-agent/modules/research_old_backup.py

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk-[a-zA-Z0-9]\{20,\}\|gsk_[a-zA-Z0-9]\{20,\}\|nvapi-[a-zA-Z0-9]\{20,\}" x-agent/modules/ x-agent/main.py; then
            echo "ERROR: Potential hardcoded API keys detected"
            exit 1
          fi
          echo "No hardcoded secrets found."
